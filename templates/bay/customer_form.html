{% extends 'bay/base.html' %}
{% load crispy_forms_tags %}
{% block title %}Register Customer — Oyera Auto Bay{% endblock %}

{% block content %}
<div class="container oab-page">
    <div class="oab-form-card">
        <span class="oab-eyebrow">Step 1 of 3 — Intake</span>
        <h1 class="oab-page-title mb-4">Register New Customer</h1>

        <div class="card">
            <div class="oab-card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="mt-4 d-flex justify-content-between">
                        <a href="{% url 'dashboard' %}" class="btn oab-btn-secondary">Cancel</a>
                        <button type="submit" class="btn oab-btn-success">Save & Register Vehicle &rarr;</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
